name: plfb-universal
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip<24
  - setuptools=65.*
  - wheel=0.38.*
  - git
  - cmake<4
  - make
  - ninja
  - pkg-config
  - swig
  - zlib
  - cxx-compiler
  - libboost-devel=1.85.*
  - libboost-python-devel=1.85.*
  - sdl2
  - sdl2_image
  - sdl2_ttf
  - sdl2_gfx
  - mesalib
  - libglu
  - libgl-devel
  - libopengl-devel
  - libegl-devel
  - numpy=1.24.*
  - psutil=6.*
  - pip:
      - absl-py
      - cmake<4
      - click
      - cloudpickle
      - colorama
      - dataclasses-json
      - gym==0.21.0
      - gymnasium==0.29.0
      - h5py
      - hf_transfer
      - "huggingface_hub[hf_transfer]>=0.20,<1.0"
      - hydra-core
      - kaggle-environments==1.14.1
      - langdetect
      - llama-index>=0.9,<0.10
      - matplotlib
      - numpy==1.24.4
      - omegaconf
      - "openai>=1.0,<3"
      - opencv-python
      - pandas
      - pydantic<2
      - "protobuf<6"
      - pygame>=1.9.6
      - pyyaml
      - requests
      - scikit-learn
      - scipy
      - structlog
      - tensorboardX
      - termcolor
      - torch==2.0.1
      - tqdm
      - "transformers>=4.46,<5"
      - typing-extensions
